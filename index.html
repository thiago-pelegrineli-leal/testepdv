            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            min-height: 100vh;
            display: flex; flex-direction: column;

        .navbar { background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--primary); backdrop-filter: blur(10px); }
        .navbar-brand { font-weight: 800; color: var(--primary) !important; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }

        .glass-panel { background: rgba(20, 20, 25, 0.9); border: 1px solid #333; border-radius: 10px; backdrop-filter: blur(15px); }

        /* Categorias */
        .category-bar { position: sticky; top: 56px; z-index: 900; background: rgba(13, 15, 18, 0.95); border-bottom: 1px solid #444; padding: 12px 0; }
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .cat-btn { background: #000; color: #fff; border: 1px solid #444; padding: 6px 20px; border-radius: 4px; cursor: pointer; white-space: nowrap; transition: 0.3s; font-weight: 600; }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 10px rgba(255,215,0,0.3); }

        /* Cards Produto */
        .prod-card { background: var(--secondary); border-radius: 8px; border: 1px solid #333; overflow: hidden; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .prod-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .img-box { width: 100%; height: 180px; overflow: hidden; background: #0b0c10; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .file-icon { font-size: 3.5rem; color: #555; }

        /* Estrelas (Staff Only) */
        .staff-rating { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 10px; pointer-events: none; }
        .stars { color: var(--star-gold); text-shadow: 0 2px 4px #000; font-size: 0.85rem; }

        footer { background: #08090b; border-top: 1px solid #333; margin-top: auto; padding: 40px 0; }
        .cart-float { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #000; cursor: pointer; z-index: 1000; box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); border: 2px solid #fff; }
        
        .modal-content { background: #1a1d24; color: white; border: 1px solid #444; }
        .form-control, .form-select { background: #0d0f12; border: 1px solid #444; color: white; }
        .form-control:focus { background: #0d0f12; color: white; border-color: var(--primary); box-shadow: none; }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="app.nav('store')"><i class="fas fa-crown me-2"></i>BAHAMAS</a>
            <button class="btn btn-sm btn-outline-light fw-bold" onclick="app.adminLogin()">
                <i class="fas fa-lock"></i> STAFF
            </button>
        </div>
    </nav>

    <main>
        <div id="view-store" class="view active">
            <div class="category-bar shadow">
                <div class="container">
                    <div class="cat-scroll" id="cat-list"></div>
                </div>
            </div>
            <div class="container py-4">
                <div class="row g-4" id="prod-grid"></div>
            </div>
        </div>

        <div id="view-admin" class="view container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-warning">Gerenciamento Staff</h3>
                <button class="btn btn-outline-light btn-sm" onclick="app.nav('store')">Sair</button>
            </div>
            
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="glass-panel p-3 mb-4">
                        <h5 class="fw-bold mb-3 text-warning">Categorias</h5>
                        <div class="input-group mb-3">
                            <input type="text" id="new-cat-name" class="form-control" placeholder="Nova categoria...">
                            <button class="btn btn-light" onclick="admin.addCategory()"><i class="fas fa-plus"></i></button>
                        </div>
                        <div id="adm-cat-list" class="list-group rounded-0"></div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="glass-panel p-4 mb-4">
                        <h5 class="fw-bold mb-3 text-warning">Novo Item / Arquivo</h5>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="small text-secondary">Nome do Produto</label>
                                <input type="text" id="p-name" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="small text-secondary">Preço (R$)</label>
                                <input type="number" id="p-price" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="small text-secondary">Nota da Staff (Avaliação)</label>
                                <select id="p-rating" class="form-select text-warning fw-bold">
                                    <option value="5">⭐⭐⭐⭐⭐ (Perfeito)</option>
                                    <option value="4">⭐⭐⭐⭐ (Ótimo)</option>
                                    <option value="3">⭐⭐⭐ (Bom)</option>
                                    <option value="2">⭐⭐ (Regular)</option>
                                    <option value="1">⭐ (Simples)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="small text-secondary">Categoria</label>
                                <select id="p-cat-select" class="form-select"></select>
                            </div>
                            <div class="col-12">
                                <label class="small text-secondary fw-bold text-white">Arquivo ou Foto (Máx 2MB - Todos os tipos aceitos)</label>
                                <input type="file" id="p-file" class="form-control" onchange="admin.handleFileSelect(this)">
                                <input type="text" id="p-url" class="form-control mt-2" placeholder="Ou use um link de imagem direta">
                            </div>
                            <div class="col-12 mt-4">
                                <button class="btn btn-warning w-100 fw-bold py-2" onclick="admin.saveProduct()">POSTAR NA LOJA</button>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel p-3">
                        <h5 class="fw-bold mb-3">Itens na Loja</h5>
                        <div class="table-responsive">
                            <table class="table table-dark align-middle mb-0"><tbody id="adm-table-prods"></tbody></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body p-0">
                    <div id="modal-content-area" style="height: 250px; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        </div>
                    <div class="p-4">
                        <div class="d-flex justify-content-between">
                            <h4 class="fw-bold text-white mb-0" id="modal-p-name">Nome</h4>
                            <div id="modal-p-stars" class="text-warning"></div>
                        </div>
                        <h3 class="text-warning fw-bold mb-3" id="modal-p-price">R$ 0,00</h3>
                        <div class="alert alert-dark border-secondary small py-2">
                             <i class="fas fa-check-circle text-success me-2"></i> Item avaliado e garantido pela equipe <b>Bahamas</b>.
                        </div>
                        <button type="button" class="btn btn-warning w-100 fw-bold py-2 mt-2" id="modal-btn-add">
                            ADICIONAR AO CARRINHO <i class="fas fa-cart-plus ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="cart-float" onclick="cart.open()">
        <i class="fas fa-shopping-bag"></i>
        <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYzx7TPmAghFcGuKYzBDIYRW0SjrMJ_r8", 
            authDomain: "quebrei-o-sistema.firebaseapp.com",
            databaseURL: "https://quebrei-o-sistema-default-rtdb.firebaseio.com",
            projectId: "quebrei-o-sistema",
            storageBucket: "quebrei-o-sistema.firebasestorage.app",
            messagingSenderId: "133672006102",
            appId: "1:133672006102:web:e62c681ced44b3650f7477"
        };

        const appDb = initializeApp(firebaseConfig);
        const db = getDatabase(appDb);

        let storeData = { prods: {}, cats: {} };
        let cartItems = [];
        let currentFileBase64 = null;
        let currentFileType = '';

        onValue(ref(db, 'store'), (snap) => {
            storeData = snap.val() || { prods: {}, cats: {} };
            app.renderStore();
            admin.render();
        });

        window.app = {
            nav: (v) => {
                document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
                document.getElementById('view-' + v).classList.add('active');
            },
            getStars: (n) => '<i class="fas fa-star"></i>'.repeat(n) + '<i class="far fa-star"></i>'.repeat(5-n),
            renderStore: (filter = 'Todos') => {
                const cats = Object.values(storeData.cats || {});
                document.getElementById('cat-list').innerHTML = `<div class="cat-btn ${filter==='Todos'?'active':''}" onclick="app.renderStore('Todos')">Tudo</div>` + 
                    cats.map(c => `<div class="cat-btn ${filter===c.name?'active':''}" onclick="app.renderStore('${c.name}')">${c.name}</div>`).join('');

                const prods = Object.values(storeData.prods || {});
                const filtered = filter === 'Todos' ? prods : prods.filter(p => p.cat === filter);
                
                document.getElementById('prod-grid').innerHTML = filtered.map(p => {
                    const isImg = (p.type && p.type.startsWith('image')) || (p.img && p.img.startsWith('http'));
                    const content = isImg ? `<img src="${p.img}">` : `<i class="fas fa-file-archive file-icon"></i>`;
                    
                    return `
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="prod-card">
                            <div class="img-box" onclick="app.openDetails('${p.id}')">
                                ${content}
                                <div class="staff-rating"><div class="stars">${app.getStars(p.rating || 5)}</div></div>
                            </div>
                            <div class="p-3 d-flex flex-column flex-grow-1">
                                <small class="text-secondary fw-bold" style="font-size:0.6rem">${p.cat}</small>
                                <h6 class="fw-bold text-white text-truncate mb-2">${p.name}</h6>
                                <div class="mt-auto d-flex justify-content-between align-items-center">
                                    <span class="fw-bold text-warning">R$ ${p.price}</span>
                                    <button class="btn btn-sm btn-light rounded-circle" onclick="cart.add('${p.id}')"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            },
            openDetails: (id) => {
                const p = storeData.prods[id];
                const isImg = (p.type && p.type.startsWith('image')) || (p.img && p.img.startsWith('http'));
                const area = document.getElementById('modal-content-area');
                
                area.innerHTML = isImg ? `<img src="${p.img}" class="w-100 h-100" style="object-fit:cover;">` : `<i class="fas fa-file-zipper text-secondary" style="font-size:5rem"></i>`;
                document.getElementById('modal-p-name').innerText = p.name;
                document.getElementById('modal-p-price').innerText = `R$ ${p.price}`;
                document.getElementById('modal-p-stars').innerHTML = app.getStars(p.rating || 5);
                document.getElementById('modal-btn-add').onclick = () => { cart.add(id); bootstrap.Modal.getInstance(document.getElementById('productModal')).hide(); };
                new bootstrap.Modal(document.getElementById('productModal')).show();
            },
            adminLogin: () => {
                Swal.fire({ title: 'Acesso Staff', input: 'password', background: '#1a1d24', color: '#fff' }).then(r => {
                    if(r.value === '2707') app.nav('admin');
                });
            }
        };

        window.cart = {
            add: (id) => {
                cartItems.push(storeData.prods[id]);
                document.getElementById('cart-badge').innerText = cartItems.length;
                Swal.mixin({toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, background: '#32bcad', color:'#fff'}).fire({icon: 'success', title: 'No carrinho!'});
            },
            open: () => {
                if(!cartItems.length) return Swal.fire('Vazio', 'Seu carrinho está vazio.', 'info');
                const total = cartItems.reduce((acc, i) => acc + parseFloat(i.price), 0);
                Swal.fire({
                    title: 'Carrinho', background: '#1a1d24', color: '#fff',
                    html: `<div class="text-start">${cartItems.map(i => `<div class="d-flex justify-content-between small border-bottom border-secondary py-1"><span>${i.name}</span><b>R$ ${i.price}</b></div>`).join('')}</div><h4 class="mt-3 text-warning text-center">Total: R$ ${total.toFixed(2)}</h4>`,
                    showCancelButton: true, confirmButtonText: 'Finalizar no Discord', confirmButtonColor: '#32bcad'
                }).then(r => {
                    if(r.isConfirmed) {
                        const msg = `🛒 *NOVO PEDIDO BAHAMAS*\n${cartItems.map(i => `• ${i.name}`).join('\n')}\n💰 Total: R$ ${total.toFixed(2)}`;
                        navigator.clipboard.writeText(msg);
                        window.open("https://discord.gg/uV3XzeWAtb", '_blank');
                        cartItems = []; document.getElementById('cart-badge').innerText = 0;
                    }
                });
            }
        };

        window.admin = {
            render: () => {
                const cats = Object.values(storeData.cats || {});
                document.getElementById('adm-cat-list').innerHTML = cats.map(c => `<div class="list-group-item bg-dark text-white border-secondary d-flex justify-content-between p-2">${c.name} <i class="fas fa-trash text-danger" onclick="admin.del('cats/${c.id}')" style="cursor:pointer"></i></div>`).join('');
                document.getElementById('p-cat-select').innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                const prods = Object.values(storeData.prods || {});
                document.getElementById('adm-table-prods').innerHTML = prods.map(p => `<tr><td>${p.name}</td><td class="text-end text-warning">R$ ${p.price} <i class="fas fa-trash text-danger ms-3" onclick="admin.del('prods/${p.id}')" style="cursor:pointer"></i></td></tr>`).join('');
            },
            handleFileSelect: (input) => {
                if(input.files && input.files[0]) {
                    const file = input.files[0];
                    if(file.size > 2200000) { input.value = ''; return Swal.fire('Erro', 'Arquivo muito pesado (Limite 2MB)', 'error'); }
                    currentFileType = file.type;
                    const reader = new FileReader();
                    reader.onload = (e) => currentFileBase64 = e.target.result;
                    reader.readAsDataURL(file);
                }
            },
            addCategory: () => {
                const name = document.getElementById('new-cat-name').value;
                if(name) {
                    const key = push(ref(db, 'store/cats')).key;
                    set(ref(db, `store/cats/${key}`), { id: key, name });
                    document.getElementById('new-cat-name').value = '';
                }
            },
            saveProduct: () => {
                const name = document.getElementById('p-name').value;
                const price = document.getElementById('p-price').value;
                const cat = document.getElementById('p-cat-select').value;
                const rating = document.getElementById('p-rating').value;
                const img = currentFileBase64 || document.getElementById('p-url').value;
                if(!name || !price || !cat || !img) return Swal.fire('Erro', 'Preencha tudo', 'error');
                const key = push(ref(db, 'store/prods')).key;
                set(ref(db, `store/prods/${key}`), { id: key, name, price, cat, rating, img, type: currentFileType || 'image/url' });
                Swal.fire('Sucesso', 'Item publicado!', 'success');
                document.getElementById('p-file').value = ''; currentFileBase64 = null;
            },
            del: (path) => remove(ref(db, `store/${path}`))
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
