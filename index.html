<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudeHub | Plataforma All-in-One</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            height: 100vh;
        }

        /* BARRA LATERAL */
        nav {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i { color: var(--accent); }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 14px 20px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        /* CONTEÚDO PRINCIPAL */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .view-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 28px; margin-bottom: 20px; font-weight: 600; }

        /* AREA DE NOTAS & PRINT A4 */
        .editor-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .btn:hover { background: var(--accent); border-color: transparent; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }

        #note-editor {
            width: 100%;
            min-height: 400px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }

        /* SEÇÃO DE SLIDES */
        .slides-wrapper {
            display: flex;
            gap: 20px;
        }

        .slides-sidebar {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slide-thumb {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            aspect-ratio: 16/9;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-muted);
        }

        .slide-thumb.active { border-color: var(--accent); color: var(--text-main); }

        .slide-editor-area {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .slide-textarea {
            width: 100%;
            height: 250px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            padding: 20px;
            font-size: 18px;
            resize: none;
            outline: none;
        }

        /* APRESENTAÇÃO SLIDE FULLSCREEN */
        #slide-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        #slide-container-view {
            color: white;
            font-size: 4rem;
            text-align: center;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .slide-close {
            position: absolute; top: 30px; right: 30px;
            font-size: 30px; color: white; cursor: pointer;
        }

        /* MAPA MENTAL */
        #canvas-container {
            width: 100%;
            height: 550px;
            background: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: rgba(15, 23, 42, 0.8);
            border: 2px dashed var(--border);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .mind-node {
            position: absolute;
            background: var(--accent);
            padding: 12px 20px;
            border-radius: 30px;
            cursor: move;
            user-select: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .mind-node i { cursor: pointer; opacity: 0.7; }
        .mind-node i:hover { opacity: 1; color: #ef4444; }

        /* MODAIS / POPUPS Customizados */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            outline: none;
        }

        .modal-actions { display: flex; justify-content: center; gap: 15px; }

        /* CONFIGURAÇÃO DE IMPRESSÃO FOLHA A4 */
        @media print {
            body * { visibility: hidden; }
            #note-editor, #note-editor * { visibility: visible; }
            #note-editor {
                position: absolute;
                left: 0; top: 0; width: 100%;
                background: white !important;
                color: black !important;
                border: none !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i> EstudeHub
        </div>
        <button class="nav-btn active" onclick="switchView('notes')">
            <i class="fa-solid fa-pen-to-square"></i> Bloco de Notas
        </button>
        <button class="nav-btn" onclick="switchView('slides')">
            <i class="fa-solid fa-layer-group"></i> Criar Slides
        </button>
        <button class="nav-btn" onclick="switchView('mindmap')">
            <i class="fa-solid fa-diagram-project"></i> Mapa Mental
        </button>
    </nav>

    <main>
        
        <section id="notes" class="view-section active">
            <h2><i class="fa-solid fa-file-lines" style="color:var(--accent)"></i> Bloco de Notas Avançado</h2>
            <div class="editor-container">
                <div class="toolbar">
                    <button class="btn" onclick="document.execCommand('bold')"><i class="fa-solid fa-bold"></i></button>
                    <button class="btn" onclick="document.execCommand('italic')"><i class="fa-solid fa-italic"></i></button>
                    <button class="btn" onclick="document.execCommand('insertUnorderedList')"><i class="fa-solid fa-list"></i></button>
                    <button class="btn btn-success" onclick="window.print()"><i class="fa-solid fa-print"></i> Imprimir em A4</button>
                    <button class="btn" onclick="showPopup('Nota salva com sucesso de forma segura!', true)"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
                </div>
                <div id="note-editor" contenteditable="true" placeholder="Comece a digitar suas anotações de estudo aqui..."></div>
            </div>
        </section>

        <section id="slides" class="view-section">
            <h2><i class="fa-solid fa-sliders" style="color:var(--accent)"></i> Apresentação de Slides</h2>
            <div class="toolbar" style="margin-bottom: 20px;">
                <button class="btn" onclick="addSlide()"><i class="fa-solid fa-plus"></i> Novo Slide</button>
                <button class="btn btn-success" onclick="startPresentation()"><i class="fa-solid fa-play"></i> Apresentar</button>
            </div>
            <div class="slides-wrapper">
                <div class="slides-sidebar" id="slides-list">
                    </div>
                <div class="slide-editor-area">
                    <h3>Conteúdo do Slide</h3>
                    <textarea class="slide-textarea" id="slide-text" oninput="updateSlideContent(this.value)" placeholder="Escreva o texto ou tópicos deste slide aqui..."></textarea>
                </div>
            </div>
        </section>

        <section id="mindmap" class="view-section">
            <h2><i class="fa-solid fa-network-wired" style="color:var(--accent)"></i> Mapa Mental Interativo</h2>
            <div class="toolbar">
                <button class="btn" onclick="openNodeModal()"><i class="fa-solid fa-circle-plus"></i> Adicionar Balão</button>
                <button class="btn" onclick="clearCanvas()"><i class="fa-solid fa-trash-can"></i> Limpar Tudo</button>
            </div>
            <div id="canvas-container">
                </div>
        </section>
    </main>

    <div id="slide-overlay">
        <i class="fa-solid fa-xmark slide-close" onclick="closePresentation()"></i>
        <div id="slide-container-view">Conteúdo do Slide</div>
    </div>

    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Mensagem</h3>
            <p id="modal-msg" style="margin-top: 10px; color: var(--text-muted);"></p>
            <input type="text" id="modal-input" style="display: none;" placeholder="Digite aqui...">
            <div class="modal-actions" style="margin-top: 20px;">
                <button class="btn btn-success" id="modal-confirm-btn" onclick="closeModal()">OK</button>
                <button class="btn" id="modal-cancel-btn" style="display: none;" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // GERENCIADOR DE VISÕES DO MENU
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // SISTEMA DE POPUP / MODAL EXCLUSIVO (SEM ALERTS)
        function showPopup(message, isAlertOnly = false, callback = null) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = "Sistema EstudeHub";
            document.getElementById('modal-msg').innerText = message;
            document.getElementById('modal-input').style.display = "none";
            document.getElementById('modal-cancel-btn').style.display = "none";

            document.getElementById('modal-confirm-btn').onclick = function() {
                modal.style.display = "none";
                if(callback) callback();
            };
            modal.style.display = "flex";
        }

        function promptPopup(message, callback) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = "Adicionar Novo Item";
            document.getElementById('modal-msg').innerText = message;
            
            const input = document.getElementById('modal-input');
            input.style.display = "block";
            input.value = "";
            
            document.getElementById('modal-cancel-btn').style.display = "inline-flex";
            
            document.getElementById('modal-confirm-btn').onclick = function() {
                if(input.value.trim() !== "") {
                    modal.style.display = "none";
                    callback(input.value);
                }
            };
            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById('custom-modal').style.display = "none";
        }

        // SISTEMA DE SLIDES
        let slides = ["Slide 1: Introdução ao seu Tema"];
        let currentSlideIndex = 0;

        function renderSlides() {
            const list = document.getElementById('slides-list');
            list.innerHTML = "";
            slides.forEach((slide, index) => {
                const thumb = document.createElement('div');
                thumb.className = `slide-thumb ${index === currentSlideIndex ? 'active' : ''}`;
                thumb.innerText = `Slide ${index + 1}`;
                thumb.onclick = () => selectSlide(index);
                list.appendChild(thumb);
            });
            document.getElementById('slide-text').value = slides[currentSlideIndex] || "";
        }

        function addSlide() {
            slides.push(`Slide ${slides.length + 1}: Novo Conteúdo`);
            currentSlideIndex = slides.length - 1;
            renderSlides();
        }

        function selectSlide(index) {
            currentSlideIndex = index;
            renderSlides();
        }

        function updateSlideContent(val) {
            slides[currentSlideIndex] = val;
        }

        function startPresentation() {
            if(slides.length === 0) return;
            let currentPresentIndex = 0;
            const overlay = document.getElementById('slide-overlay');
            const viewer = document.getElementById('slide-container-view');
            
            overlay.style.display = "flex";
            viewer.innerText = slides[currentPresentIndex];

            // Mudar slide com setas ou clique
            overlay.onclick = function() {
                currentPresentIndex++;
                if(currentPresentIndex < slides.length) {
                    viewer.innerText = slides[currentPresentIndex];
                } else {
                    closePresentation();
                }
            };
        }

        function closePresentation() {
            document.getElementById('slide-overlay').style.display = "none";
        }

        // SISTEMA DE MAPA MENTAL (ARRASTAR E SOLTAR)
        const canvas = document.getElementById('canvas-container');

        function openNodeModal() {
            promptPopup("Qual é a ideia central ou conceito do balão?", function(text) {
                createMindNode(text);
            });
        }

        function createMindNode(text) {
            const node = document.createElement('div');
            node.className = 'mind-node';
            node.style.left = '150px';
            node.style.top = '150px';
            node.innerHTML = `<span>${text}</span> <i class="fa-solid fa-circle-xmark" onclick="this.parentElement.remove()"></i>`;
            
            // Lógica de Arrastar (Drag and Drop)
            let isDragging = false;
            let offsetX, offsetY;

            node.addEventListener('mousedown', (e) => {
                if(e.target.tagName === 'I') return;
                isDragging = true;
                offsetX = e.clientX - node.getBoundingClientRect().left;
                offsetY = e.clientY - node.getBoundingClientRect().top;
                node.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const rect = canvas.getBoundingClientRect();
                let x = e.clientX - rect.left - offsetX;
                let y = e.clientY - rect.top - offsetY;

                // Restringir limites dentro do canvas
                x = Math.max(0, Math.min(x, rect.width - node.offsetWidth));
                y = Math.max(0, Math.min(y, rect.height - node.offsetHeight));

                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                node.style.cursor = 'move';
            });

            canvas.appendChild(node);
        }

        function clearCanvas() {
            canvas.innerHTML = "";
        }

        // Inicialização Inicial
        renderSlides();
    </script>
</body>
</html>
