<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="icon" type="image/jpeg" href="https://underlying-brown-selvw25e.edgeone.dev/Design%20sem%20nome.png">
  
  <title>Financeiro Grêmio Inteligente</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Animações customizadas */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    /* Scrollbar customizada */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body class="transition-colors duration-300 bg-gray-100 dark:bg-gray-950 text-gray-800 dark:text-gray-100 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShoppingCart, Settings, Tag, PlusCircle, MinusCircle, CheckCircle, 
      CreditCard, Banknote, X, Edit2, Trash2, RotateCcw, LayoutDashboard, 
      History, Printer, Download, Calculator, Lock, Sun, Moon, AlertTriangle, Info,
      GripHorizontal, Archive, Image as ImageIcon, ArrowUpRight, Eye, Package
    } from 'lucide-react';

    function App() {
      // --- GERENCIAMENTO DE ESTADO E LOCALSTORAGE ---
      const loadData = (key, defaultValue) => {
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : defaultValue;
      };

      const [theme, setTheme] = useState(() => loadData('pdv_theme', 'light'));
      
      const defaultSettings = { 
        eventName: 'Gestão Financeira', 
        gremioName: 'Grêmio Geração Consciente',
        logoUrl: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1jvlQ6U_vRu2P3HDiuX9V11-93jeq1u78JI4yT7w6tdOClxB2N-bglMI&s=10'
      };
      
      const [settings, setSettings] = useState(() => {
        const loaded = loadData('pdv_settings', defaultSettings);
        return { ...defaultSettings, ...loaded };
      });
      
      const [eventLogs, setEventLogs] = useState(() => loadData('pdv_event_logs', []));
      const [products, setProducts] = useState(() => loadData('pdv_products', []));
      const [sales, setSales] = useState(() => loadData('pdv_sales', []));
      // NOVO ESTADO: Bloquinho de PIX (Despesas)
      const [pixExpenses, setPixExpenses] = useState(() => loadData('pdv_pix_expenses', []));
      
      const [activeTab, setActiveTab] = useState('pos'); 
      const [cart, setCart] = useState([]);
      const [cartDiscount, setCartDiscount] = useState(0);

      const defaultDrawer = {
        200: 0, 100: 0, 50: 0, 20: 0, 10: 0, 5: 0, 2: 0, 1: 0, 0.5: 0, 0.25: 0, 0.1: 0, 0.05: 0
      };
      const [cashDrawer, setCashDrawer] = useState(() => loadData('pdv_cash_drawer', defaultDrawer));

      // Modais Customizados
      const [isCalcOpen, setIsCalcOpen] = useState(false);
      const [calcInput, setCalcInput] = useState('');
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', text: '', action: null, isDanger: false });
      const [alertDialog, setAlertDialog] = useState({ isOpen: false, title: '', text: '' });
      const [isPixModalOpen, setIsPixModalOpen] = useState(false);
      const [viewLogModal, setViewLogModal] = useState(null); // Visualizar evento arquivado
      
      const [editingProduct, setEditingProduct] = useState(null);
      const [prodName, setProdName] = useState('');
      const [prodPrice, setProdPrice] = useState('');
      const [prodStock, setProdStock] = useState('');
      
      // Form de Saídas PIX
      const [expDesc, setExpDesc] = useState('');
      const [expAmount, setExpAmount] = useState('');

      const [checkoutMsg, setCheckoutMsg] = useState('');
      const [pixStudentName, setPixStudentName] = useState('');
      const [pixStudentClass, setPixStudentClass] = useState('');

      // Persistência
      useEffect(() => { localStorage.setItem('pdv_theme', JSON.stringify(theme)); }, [theme]);
      useEffect(() => { localStorage.setItem('pdv_settings', JSON.stringify(settings)); }, [settings]);
      useEffect(() => { localStorage.setItem('pdv_event_logs', JSON.stringify(eventLogs)); }, [eventLogs]);
      useEffect(() => { localStorage.setItem('pdv_products', JSON.stringify(products)); }, [products]);
      useEffect(() => { localStorage.setItem('pdv_sales', JSON.stringify(sales)); }, [sales]);
      useEffect(() => { localStorage.setItem('pdv_cash_drawer', JSON.stringify(cashDrawer)); }, [cashDrawer]);
      useEffect(() => { localStorage.setItem('pdv_pix_expenses', JSON.stringify(pixExpenses)); }, [pixExpenses]);

      // Aplicação do Tema Dark/Light
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // Utilitários
      const formatCurrency = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      const formatDate = (isoString) => new Date(isoString).toLocaleString('pt-BR');

      // --- CAIXA E VENDAS ---
      const addToCart = (product) => {
        setCart(prev => {
          const exists = prev.find(i => i.product.id === product.id);
          // Verifica estoque
          if (product.stock !== undefined && product.stock !== '') {
            const currentQty = exists ? exists.quantity : 0;
            if (currentQty >= product.stock) {
              setAlertDialog({ isOpen: true, title: 'Estoque Esgotado', text: `Você só tem ${product.stock} unidades de ${product.name} em estoque.`});
              return prev;
            }
          }
          if (exists) return prev.map(i => i.product.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
          return [...prev, { product, quantity: 1 }];
        });
      };

      const removeFromCart = (productId) => {
        setCart(prev => {
          const exists = prev.find(i => i.product.id === productId);
          if (exists.quantity === 1) return prev.filter(i => i.product.id !== productId);
          return prev.map(i => i.product.id === productId ? { ...i, quantity: i.quantity - 1 } : i);
        });
      };

      const cartSubtotal = cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
      const cartTotal = Math.max(0, cartSubtotal - cartDiscount);

      const handlePixClick = () => {
        if (cart.length === 0) return;
        setIsPixModalOpen(true);
      };

      const processCheckout = (paymentMethod) => {
        if (cart.length === 0) return;
        
        if (paymentMethod === 'PIX' && (!pixStudentName.trim() || !pixStudentClass.trim())) {
          setAlertDialog({ isOpen: true, title: 'Atenção', text: 'Por favor, preencha o Nome e a Série do aluno.'});
          return;
        }

        const newSale = {
          id: Date.now().toString(),
          items: [...cart], subtotal: cartSubtotal, discount: cartDiscount, total: cartTotal,
          paymentMethod, timestamp: new Date().toISOString(),
          studentInfo: paymentMethod === 'PIX' ? { name: pixStudentName, schoolClass: pixStudentClass } : null
        };

        // Atualizar estoque
        const updatedProducts = products.map(p => {
          const inCart = cart.find(c => c.product.id === p.id);
          if (inCart && p.stock !== undefined && p.stock !== '') {
            return { ...p, stock: p.stock - inCart.quantity };
          }
          return p;
        });

        setProducts(updatedProducts);
        setSales([newSale, ...sales]); setCart([]); setCartDiscount(0);
        setPixStudentName(''); setPixStudentClass(''); setIsPixModalOpen(false);

        setCheckoutMsg(`Sucesso! ${formatCurrency(cartTotal)} via ${paymentMethod}`);
        setTimeout(() => setCheckoutMsg(''), 3000);
      };

      const cancelSale = (saleId) => {
        const saleToCancel = sales.find(s => s.id === saleId);
        setConfirmDialog({
          isOpen: true, title: 'Estornar Venda', text: 'Tem certeza que deseja estornar (cancelar) esta venda? O estoque será devolvido.', isDanger: true,
          action: () => {
            // Devolver estoque
            let updatedProducts = [...products];
            saleToCancel.items.forEach(item => {
              updatedProducts = updatedProducts.map(p => {
                if (p.id === item.product.id && p.stock !== undefined && p.stock !== '') {
                  return { ...p, stock: p.stock + item.quantity };
                }
                return p;
              });
            });
            setProducts(updatedProducts);
            setSales(sales.filter(s => s.id !== saleId));
          }
        });
      };

      // --- PRODUTOS ---
      const saveProduct = (e) => {
        e.preventDefault();
        if (!prodName || !prodPrice) return;
        const priceNum = parseFloat(prodPrice.toString().replace(',', '.'));
        const stockNum = prodStock !== '' ? parseInt(prodStock) : '';
        
        if (editingProduct) {
          setProducts(products.map(p => p.id === editingProduct.id ? { ...p, name: prodName, price: priceNum, stock: stockNum } : p));
          setEditingProduct(null);
        } else {
          setProducts([...products, { id: Date.now().toString(), name: prodName, price: priceNum, stock: stockNum }]);
        }
        setProdName(''); setProdPrice(''); setProdStock('');
      };

      const deleteProduct = (id) => {
        setConfirmDialog({
          isOpen: true, title: 'Excluir Produto', text: 'Deseja excluir este produto definitivamente do cardápio?', isDanger: true,
          action: () => {
            setProducts(products.filter(p => p.id !== id));
            setCart(cart.filter(item => item.product.id !== id));
          }
        });
      };

      // --- DESPESAS (PIX) ---
      const saveExpense = (e) => {
        e.preventDefault();
        if(!expDesc || !expAmount) return;
        const amountNum = parseFloat(expAmount.toString().replace(',', '.'));
        setPixExpenses([{
          id: Date.now().toString(), description: expDesc, amount: amountNum, isSpent: false, date: new Date().toISOString()
        }, ...pixExpenses]);
        setExpDesc(''); setExpAmount('');
      };

      const toggleExpenseStatus = (id) => {
        setPixExpenses(pixExpenses.map(exp => exp.id === id ? { ...exp, isSpent: !exp.isSpent } : exp));
      };

      const deleteExpense = (id) => {
        setPixExpenses(pixExpenses.filter(e => e.id !== id));
      };

      // --- EXPORTAÇÃO E CÁLCULOS ---
      const getReport = (salesData = sales) => {
        return salesData.reduce((acc, sale) => {
          acc.total += sale.total;
          acc.discounts += sale.discount || 0;
          if (sale.paymentMethod === 'PIX') acc.pix += sale.total;
          if (sale.paymentMethod === 'DINHEIRO') acc.dinheiro += sale.total;

          sale.items.forEach(item => {
            if (!acc.items[item.product.id]) acc.items[item.product.id] = { name: item.product.name, quantity: 0, total: 0 };
            acc.items[item.product.id].quantity += item.quantity;
            acc.items[item.product.id].total += (item.quantity * item.product.price);
          });
          return acc;
        }, { total: 0, pix: 0, dinheiro: 0, discounts: 0, items: {} });
      };

      // Funcionalidade de Impressão (Força tema claro)
      const executeWithLightMode = (callback) => {
        const wasDark = document.documentElement.classList.contains('dark');
        if (wasDark) document.documentElement.classList.remove('dark');
        
        setTimeout(() => {
          callback(() => {
            if (wasDark) document.documentElement.classList.add('dark');
          });
        }, 150);
      };

      const requestPrint = () => {
        executeWithLightMode((restoreTheme) => {
          window.print();
          setTimeout(restoreTheme, 1000); 
        });
      };

      const downloadPDF = (elementId, filenamePrefix) => {
        const element = document.getElementById(elementId);
        executeWithLightMode((restoreTheme) => {
          const opt = {
            margin: 10,
            filename: `${filenamePrefix}_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
          };
          html2pdf().set(opt).from(element).save().then(restoreTheme);
        });
      };

      const calculateDrawerTotal = () => {
        return Object.entries(cashDrawer).reduce((total, [value, qty]) => total + (Number(value) * Number(qty || 0)), 0);
      };

      // --- CALCULADORA ---
      const calcPos = useRef({ x: window.innerWidth > 768 ? window.innerWidth - 300 : 20, y: 20 });
      const calcRef = useRef(null);

      const handleCalcDragStart = (e) => {
        const startX = e.clientX || e.touches[0].clientX;
        const startY = e.clientY || e.touches[0].clientY;
        const startPosX = calcPos.current.x;
        const startPosY = calcPos.current.y;

        const onMove = (moveEvent) => {
          const currentX = moveEvent.clientX || (moveEvent.touches && moveEvent.touches[0].clientX);
          const currentY = moveEvent.clientY || (moveEvent.touches && moveEvent.touches[0].clientY);
          calcPos.current = {
            x: startPosX + (currentX - startX),
            y: startPosY + (currentY - startY)
          };
          if(calcRef.current) {
            calcRef.current.style.transform = `translate(${calcPos.current.x}px, ${calcPos.current.y}px)`;
          }
        };

        const onEnd = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onEnd);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onEnd);
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
      };

      const handleCalcBtn = (btn) => {
        if(btn === 'C') setCalcInput('');
        else if(btn === '=') { 
          try { 
            let evalStr = calcInput.replace(/×/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
            let res = eval(evalStr);
            setCalcInput(res.toString().replace(/\./g, ',')); 
          } catch(e) { 
            setCalcInput('Erro'); 
          } 
        } 
        else { 
          setCalcInput(prev => prev === 'Erro' ? btn : prev + btn); 
        }
      };

      const NavItem = ({ id, icon: Icon, label }) => (
        <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 font-medium ${activeTab === id ? 'bg-blue-600 text-white shadow-lg scale-[1.02]' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:scale-[1.02]'}`}>
          <Icon size={20} /> <span className="hidden md:block">{label}</span>
        </button>
      );

      const reportData = getReport();
      const drawerTotal = calculateDrawerTotal();
      const drawerDiff = drawerTotal - reportData.dinheiro;

      return (
        <div className="min-h-screen flex w-full">
          
          {/* ================= MODAIS ESCONDIDOS ================= */}
          
          {/* Modal Visualizar Log Arquivado */}
          {viewLogModal && (
            <div className="absolute inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col animate-fade-in overflow-hidden">
                <div className="flex justify-between items-center p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900">
                  <h3 className="font-bold text-lg flex items-center gap-2"><Archive size={20} /> Evento: {viewLogModal.eventName}</h3>
                  <div className="flex gap-2">
                    <button onClick={() => downloadPDF('archived-log-content', 'Log_Evento')} className="p-2 bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 rounded-lg hover:bg-blue-200 transition-colors" title="Baixar PDF"><Download size={18}/></button>
                    <button onClick={() => setViewLogModal(null)} className="p-2 text-gray-500 hover:text-red-500"><X size={20} /></button>
                  </div>
                </div>
                
                <div className="p-6 overflow-y-auto" id="archived-log-content">
                  <div className="text-center mb-6 border-b pb-4 dark:border-gray-700">
                    <h2 className="text-2xl font-black">{viewLogModal.eventName}</h2>
                    <p className="text-gray-500">Encerrado em: {new Date(viewLogModal.date).toLocaleString('pt-BR')}</p>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4 mb-6">
                    <div className="bg-gray-100 dark:bg-gray-900 p-4 rounded-xl border-l-4 border-l-blue-500">
                      <p className="text-xs uppercase font-bold text-gray-500">Faturamento Bruto</p>
                      <p className="text-2xl font-black text-gray-800 dark:text-gray-100">{formatCurrency(viewLogModal.totalSales)}</p>
                    </div>
                    <div className="bg-gray-100 dark:bg-gray-900 p-4 rounded-xl border-l-4 border-l-green-500">
                      <p className="text-xs uppercase font-bold text-gray-500">Total de Vendas</p>
                      <p className="text-2xl font-black text-gray-800 dark:text-gray-100">{viewLogModal.salesCount} transações</p>
                    </div>
                  </div>

                  <h4 className="font-bold mb-2">Lista de Vendas Realizadas</h4>
                  <div className="space-y-2">
                    {viewLogModal.salesData.map(s => (
                      <div key={s.id} className="flex justify-between items-center text-sm p-2 bg-gray-50 dark:bg-gray-700/30 rounded border dark:border-gray-700">
                        <span>{new Date(s.timestamp).toLocaleTimeString('pt-BR')} - {s.paymentMethod}</span>
                        <span className="font-bold">{formatCurrency(s.total)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Outros Modais (Alerta, Confirmação, Calc, PIX) mantidos e otimizados... */}
          {/* ... (Alerta Simples) ... */}
          {alertDialog.isOpen && (
            <div className="absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm p-6 animate-fade-in">
                <div className="flex items-center gap-3 mb-4 text-blue-600 dark:text-blue-400">
                  <Info size={28}/> <h3 className="text-xl font-bold">{alertDialog.title}</h3>
                </div>
                <p className="text-gray-700 dark:text-gray-300 mb-6">{alertDialog.text}</p>
                <button onClick={() => setAlertDialog({isOpen: false})} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-transform hover:scale-105">Entendi</button>
              </div>
            </div>
          )}

          {/* ... (Confirmação) ... */}
          {confirmDialog.isOpen && (
            <div className="absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm p-6 animate-fade-in">
                <div className={`flex items-center gap-3 mb-4 ${confirmDialog.isDanger ? 'text-red-500' : 'text-blue-600 dark:text-blue-400'}`}>
                  {confirmDialog.isDanger ? <AlertTriangle size={28}/> : <Info size={28}/>} 
                  <h3 className="text-xl font-bold">{confirmDialog.title}</h3>
                </div>
                <p className="text-gray-700 dark:text-gray-300 mb-6">{confirmDialog.text}</p>
                <div className="flex gap-3">
                  <button onClick={() => setConfirmDialog({...confirmDialog, isOpen: false})} className="flex-1 py-3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-xl font-bold hover:bg-gray-300 transition-colors">Cancelar</button>
                  <button onClick={() => { confirmDialog.action(); setConfirmDialog({...confirmDialog, isOpen: false}); }} className={`flex-1 py-3 text-white rounded-xl font-bold transition-transform hover:scale-105 ${confirmDialog.isDanger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>Confirmar</button>
                </div>
              </div>
            </div>
          )}

          {/* Calculadora Flutuante */}
          {isCalcOpen && (
            <div ref={calcRef} style={{ transform: `translate(${calcPos.current.x}px, ${calcPos.current.y}px)` }} className="fixed top-0 left-0 z-50 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 w-64 print:hidden animate-fade-in overflow-hidden">
              <div className="flex justify-between items-center p-3 bg-gray-100 dark:bg-gray-900 cursor-move border-b border-gray-200 dark:border-gray-700" onMouseDown={handleCalcDragStart} onTouchStart={handleCalcDragStart}>
                <div className="flex items-center gap-2 text-gray-500"><GripHorizontal size={16}/><span className="font-bold text-sm uppercase">Calculadora</span></div>
                <button onClick={() => setIsCalcOpen(false)} className="text-gray-500 hover:text-red-500"><X size={18}/></button>
              </div>
              <div className="p-4">
                <div className="bg-gray-100 dark:bg-gray-900 p-3 rounded-xl text-right text-2xl font-mono mb-3 overflow-hidden border dark:border-gray-700 h-14 flex items-center justify-end">{calcInput || '0'}</div>
                <div className="grid grid-cols-4 gap-2">
                  {['7','8','9','÷','4','5','6','×','1','2','3','-','C','0',',','+'].map(btn => (
                    <button key={btn} onClick={() => handleCalcBtn(btn)} className={`p-3 rounded-lg font-bold text-lg hover:-translate-y-1 transition-all ${btn === 'C' ? 'bg-red-500 text-white shadow-md shadow-red-500/20' : ['÷','×','-','+'].includes(btn) ? 'bg-gray-200 dark:bg-gray-700' : 'bg-gray-50 dark:bg-gray-800 border dark:border-gray-600 hover:bg-gray-200 dark:hover:bg-gray-700 shadow-sm'}`}>{btn}</button>
                  ))}
                  <button onClick={() => handleCalcBtn('=')} className="col-span-4 p-3 bg-blue-600 text-white rounded-lg font-bold text-lg hover:bg-blue-700 transition-transform hover:-translate-y-1 shadow-md shadow-blue-500/30">=</button>
                </div>
              </div>
            </div>
          )}

          {/* Modal PIX */}
          {isPixModalOpen && (
            <div className="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-fade-in">
                <div className="flex justify-between items-center p-4 border-b dark:border-gray-700 bg-teal-50 dark:bg-teal-900/30">
                  <h3 className="font-bold text-teal-800 dark:text-teal-400 flex items-center gap-2"><CreditCard size={20} /> Dados do PIX</h3>
                  <button onClick={() => setIsPixModalOpen(false)} className="text-gray-500 hover:text-gray-700 dark:text-gray-400"><X size={20} /></button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="text-center mb-6">
                    <p className="text-sm text-gray-500 dark:text-gray-400">Cobrar no PIX:</p>
                    <p className="text-3xl font-black text-teal-600 dark:text-teal-400">{formatCurrency(cartTotal)}</p>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold mb-1">Nome do Aluno</label>

                      </div>
                      <div className="bg-gray-50 print:bg-gray-50 p-5 rounded-xl border-l-4 border-l-teal-500 border border-gray-200 shadow-sm">
                        <p className="text-xs font-bold uppercase text-gray-600 mb-1">Total PIX</p>
                        <p className="text-2xl font-black">{formatCurrency(reportData.pix)}</p>
                      </div>
                      <div className="bg-gray-50 print:bg-gray-50 p-5 rounded-xl border-l-4 border-l-emerald-500 border border-gray-200 shadow-sm">
                        <p className="text-xs font-bold uppercase text-gray-600 mb-1">Total Dinheiro</p>
                        <p className="text-2xl font-black">{formatCurrency(reportData.dinheiro)}</p>
                      </div>
                    </div>

                    <div>
                      <h3 className="text-lg font-bold border-b border-gray-300 pb-2 mb-4">Produtos Vendidos</h3>
                      <table className="w-full text-left">
                        <thead className="text-xs uppercase text-gray-600 border-b border-gray-300">
                          <tr><th className="py-2">Produto</th><th className="py-2 text-center">Qtd</th><th className="py-2 text-right">Receita</th></tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {Object.values(reportData.items).map((item, idx) => (
                            <tr key={idx}>
                              <td className="py-2 font-medium">{item.name}</td>
                              <td className="py-2 text-center font-bold text-blue-700">{item.quantity}</td>
                              <td className="py-2 text-right">{formatCurrency(item.total)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    {/* Resumo de Despesas no Relatório */}
                    {pixExpenses.length > 0 && (
                      <div className="mt-8 border-t-2 border-dashed border-gray-300 pt-6">
                        <h3 className="text-lg font-bold border-b border-gray-300 pb-2 mb-4 text-red-600">Saídas e Despesas PIX Registradas</h3>
                        <table className="w-full text-left">
                           <thead className="text-xs uppercase text-gray-600 border-b border-gray-300">
                             <tr><th className="py-2">Descrição</th><th className="py-2 text-center">Status</th><th className="py-2 text-right">Valor</th></tr>
                           </thead>
                           <tbody className="divide-y divide-gray-200">
                             {pixExpenses.map(exp => (
                               <tr key={exp.id}>
                                 <td className="py-2 text-sm">{exp.description}</td>
                                 <td className="py-2 text-center text-xs font-bold text-gray-500">{exp.isSpent ? 'Utilizado' : 'Pendente'}</td>
                                 <td className="py-2 text-right font-bold text-red-600">- {formatCurrency(exp.amount)}</td>
                               </tr>
                             ))}
                           </tbody>
                        </table>
                      </div>
                    )}

                    {/* ÁREA DE ASSINATURAS */}
                    <div className="mt-20 pt-16 flex flex-col md:flex-row justify-around text-center text-sm font-semibold text-black gap-8">
                      <div><p>_____________________________________</p><p className="mt-2">Presidente / Coord. Geral</p></div>
                      <div><p>_____________________________________</p><p className="mt-2">Diretoria Financeira</p></div>
                      <div><p>_____________________________________</p><p className="mt-2">Operador de Caixa</p></div>
                    </div>
                  </div>
                </div>
              )}

              {/* ABA FECHAMENTO GAVETA MANTIDA (Código igual ao seu original apenas com Animate-fade-in) */}
              {(activeTab === 'closing') && (
                <div className="max-w-4xl mx-auto animate-fade-in">
                  <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 mb-6 flex justify-between items-center print:hidden">
                    <div>
                      <h2 className="text-xl font-bold">Fechamento Físico</h2>
                      <p className="text-sm text-gray-500">Conferência da gaveta de dinheiro</p>
                    </div>
                    <div className="flex gap-3">
                      <button onClick={requestPrint} className="bg-gray-800 hover:bg-gray-700 dark:bg-gray-600 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-transform hover:-translate-y-1 shadow-md"><Printer size={18} /> Imprimir</button>
                      <button onClick={() => downloadPDF('closing-pdf-content', 'Fechamento_Gaveta')} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-transform hover:-translate-y-1 shadow-md"><Download size={18} /> Baixar PDF</button>
                    </div>
                  </div>

                  <div id="closing-pdf-content" className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 print:border-none print:shadow-none space-y-8 print:bg-white !text-black text-black">
                     {/* Mesma lógica de renderização do gaveta que você enviou... */}
                     <div className="text-center border-b-2 border-gray-300 pb-4 flex flex-col items-center">
                      <img src={settings.logoUrl} alt="Logo" className="w-16 h-16 rounded-full object-cover border-2 border-gray-300 mb-3" />
                      <h1 className="text-3xl font-black uppercase">{settings.gremioName}</h1>
                      <h2 className="text-xl font-bold text-gray-700 mt-1">{settings.eventName}</h2>
                      <p className="text-lg mt-1">Fechamento de Caixa (Gaveta)</p>
                      <p className="text-sm mt-2 text-gray-600">Gerado em: {formatDate(new Date().toISOString())}</p>
                    </div>
                    
                    <div className="print:hidden">
                      <p className="text-sm text-gray-600 mb-4">Preencha as quantidades de cada nota/moeda física que está no caixa agora.</p>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {Object.keys(cashDrawer).sort((a,b)=>b-a).map(val => (
                          <div key={val} className="flex items-center justify-between bg-gray-50 border border-gray-300 p-2 rounded-lg shadow-sm hover:border-blue-300 transition-colors">
                            <span className="text-xs font-bold text-gray-700">R$ {Number(val).toFixed(2)}</span>
                            <input type="number" min="0" step="1" value={cashDrawer[val] || ''} onChange={(e) => setCashDrawer({...cashDrawer, [val]: Number(e.target.value)})} className="w-16 p-1 text-center bg-white border border-gray-300 rounded outline-none font-mono font-bold focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="0" />
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-center bg-gray-50 print:bg-gray-50 p-6 rounded-xl shadow-sm border border-gray-300">
                      <div className="text-center md:text-left mb-4 md:mb-0">
                        <p className="text-xs uppercase font-bold text-gray-600">Valor Físico Contado</p>
                        <p className="text-3xl font-black text-emerald-700">{formatCurrency(drawerTotal)}</p>
                      </div>
                      <div className="text-center">
                        <p className="text-xs uppercase font-bold text-gray-600">Registrado no Sistema</p>
                        <p className="text-xl font-bold text-gray-800">{formatCurrency(reportData.dinheiro)}</p>
                      </div>
                      <div className="text-center md:text-right mt-4 md:mt-0">
                        <p className="text-xs uppercase font-bold text-gray-600">Diferença de Caixa</p>
                        {drawerDiff === 0 ? (
                          <p className="text-2xl font-bold text-green-700">Bateu Perfeito (+R$ 0,00)</p>
                        ) : drawerDiff > 0 ? (
                          <p className="text-2xl font-bold text-blue-700">Sobra: {formatCurrency(drawerDiff)}</p>
                        ) : (
                          <p className="text-2xl font-bold text-red-700">Falta (Quebra): {formatCurrency(Math.abs(drawerDiff))}</p>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* === CONFIGURAÇÕES === */}
              {activeTab === 'settings' && (
                <div className="max-w-3xl mx-auto print:hidden space-y-6 animate-fade-in">
                  <h2 className="text-2xl font-bold mb-6">Configurações do Sistema</h2>
                  
                  {/* Identidade Visual */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border dark:border-gray-700 p-6 space-y-4">
                    <h3 className="font-bold text-lg border-b dark:border-gray-700 pb-2 flex items-center gap-2"><ImageIcon size={20}/> Identidade Visual</h3>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold mb-2">Nome do Grêmio / Organização</label>
                        <input type="text" value={settings.gremioName} onChange={e => setSettings({...settings, gremioName: e.target.value})} className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none focus:border-blue-500 transition-colors" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-2">Nome do Evento Atual</label>
                        <input type="text" value={settings.eventName} onChange={e => setSettings({...settings, eventName: e.target.value})} className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none focus:border-blue-500 transition-colors" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold mb-2">URL da Logo (Imagem)</label>
                      <input type="url" value={settings.logoUrl} onChange={e => setSettings({...settings, logoUrl: e.target.value})} className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none focus:border-blue-500 transition-colors" placeholder="https://..." />
                    </div>
                  </div>

                  {/* Gerenciamento de Eventos (Logs) */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border dark:border-gray-700 p-6">
                     <h3 className="font-bold text-lg border-b dark:border-gray-700 pb-2 mb-4 flex items-center gap-2"><Archive size={20}/> Gerenciamento de Eventos (Arquivar)</h3>
                     <p className="text-sm text-gray-600 dark:text-gray-400 mb-4">
                       Finalizou o evento de hoje? Arquive as vendas para limpar o caixa e guardar os registros no histórico para ver ou imprimir depois.
                     </p>
                     <button onClick={() => {
                        if(sales.length === 0) return setAlertDialog({isOpen: true, title: 'Aviso', text: 'Não há vendas neste evento para arquivar.'});
                        setConfirmDialog({
                          isOpen: true, title: 'Arquivar Evento', text: `Deseja encerrar o evento "${settings.eventName}" e salvar os logs? O caixa e as despesas serão zerados para o próximo evento.`, isDanger: false,
                          action: () => {
                            const newLog = {
                              id: Date.now().toString(),
                              eventName: settings.eventName,
                              date: new Date().toISOString(),
                              totalSales: getReport(sales).total,
                              salesCount: sales.length,
                              salesData: [...sales]
                            };
                            setEventLogs([newLog, ...eventLogs]);
                            setSales([]);
                            setPixExpenses([]); // Zera as despesas tb
                            setCashDrawer(defaultDrawer);
                            setSettings({...settings, eventName: 'Novo Evento'});
                            setAlertDialog({isOpen: true, title: 'Sucesso', text: 'Evento salvo nos logs e caixa zerado com sucesso!'});
                          }
                        });
                     }} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center w-full md:w-auto gap-2 transition-transform hover:-translate-y-1 shadow-md hover:shadow-blue-500/30">
                       <Archive size={20}/> Encerrar Evento Atual e Arquivar
                     </button>

                     {/* Tabela de Logs Antigos */}
                     {eventLogs.length > 0 && (
                       <div className="mt-8 animate-fade-in">
                         <h4 className="font-bold mb-3">Histórico de Eventos Anteriores</h4>
                         <div className="overflow-x-auto">
                           <table className="w-full text-left text-sm border dark:border-gray-700 rounded-lg overflow-hidden shadow-sm">
                             <thead className="bg-gray-100 dark:bg-gray-900 text-gray-600 dark:text-gray-400">
                               <tr><th className="p-3">Data</th><th className="p-3">Evento</th><th className="p-3 text-right">Faturamento</th><th className="p-3 text-center">Ações</th></tr>
                             </thead>
                             <tbody className="divide-y divide-gray-200 dark:divide-gray-700">
                               {eventLogs.map(log => (
                                 <tr key={log.id} className="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                                   <td className="p-3">{new Date(log.date).toLocaleDateString('pt-BR')}</td>
                                   <td className="p-3 font-medium">{log.eventName}</td>
                                   <td className="p-3 text-right font-bold text-green-600 dark:text-green-400">{formatCurrency(log.totalSales)}</td>
                                   <td className="p-3 text-center">
                                     <button onClick={() => setViewLogModal(log)} className="inline-flex items-center gap-1 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-200 dark:hover:bg-blue-900 transition-colors"><Eye size={14}/> Ver PDF</button>
                                   </td>
                                 </tr>
                               ))}
                             </tbody>
                           </table>
                         </div>
                       </div>
                     )}
                  </div>

                  {/* Zona de Perigo */}
                  <div className="bg-red-50 dark:bg-red-900/20 rounded-2xl border border-red-200 dark:border-red-800/50 p-6">
                    <h3 className="font-bold text-red-800 dark:text-red-400 mb-2 flex items-center gap-2"><AlertTriangle/> Zona de Perigo</h3>
                    <p className="text-sm text-red-600 dark:text-red-300 mb-4">Isto apagará todas as vendas do evento atual, histórico de logs salvos e resetará a gaveta.</p>
                    <button onClick={() => {
                        setConfirmDialog({
                          isOpen: true, title: 'Zerar Todo o Sistema', text: 'Você tem certeza absoluta? Todo o histórico atual, logs de eventos anteriores e dados da gaveta serão perdidos permanentemente.', isDanger: true,
                          action: () => {
                            setSales([]); setEventLogs([]); setCashDrawer(defaultDrawer); setPixExpenses([]); setActiveTab('pos');
                          }
                        });
                    }} className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition-transform hover:scale-105 shadow-md">
                      Excluir Todos os Dados e Resetar
                    </button>
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
