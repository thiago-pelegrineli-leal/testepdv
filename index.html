<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="icon" type="image/jpeg" href="https://media-gru1-1.cdn.whatsapp.net/v/t61.24694-24/489405406_650586094569182_6793834854762065392_n.jpg?ccb=11-4&oh=01_Q5Aa4wGY7p0SayjbDIPzs9zg4cRQqjwpuZWHtXDXiacRVfJnLw&oe=6A35BF57&_nc_sid=5e03e0&_nc_cat=102">
  
  <title>PDV Profissional Grêmio</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime", 
      "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0",
      "firebase/app": "https://esm.sh/firebase@10.8.0/app",
      "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore"
    }
  }
</script>
</head>
<body class="transition-colors duration-300 bg-gray-100 dark:bg-gray-950 text-gray-800 dark:text-gray-100">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShoppingCart, Settings, Tag, PlusCircle, MinusCircle, CheckCircle, 
      CreditCard, Banknote, X, Edit2, Trash2, RotateCcw, LayoutDashboard, 
      History, Printer, Download, Calculator, Lock, Sun, Moon, AlertTriangle, Info,
      GripHorizontal, Archive, Image as ImageIcon, Cloud, Wifi, WifiOff, FileText
    } from 'lucide-react';

    import { initializeApp } from "firebase/app";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "firebase/firestore";

    // --- CONFIGURAÇÃO DO FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyAd_XhH4euXapob_ORf1Uuv4YobRizX4a4",
      authDomain: "pdv-81850.firebaseapp.com",
      projectId: "pdv-81850",
      storageBucket: "pdv-81850.firebasestorage.app",
      messagingSenderId: "170651547564",
      appId: "1:170651547564:web:962c1e5840e7970663ac09",
      measurementId: "G-FE5G0NDBC3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function App() {
      // --- GERENCIAMENTO DE ESTADO E LOCALSTORAGE ---
      const loadData = (key, defaultValue) => {
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : defaultValue;
      };

      const [theme, setTheme] = useState(() => loadData('pdv_theme', 'light'));
      
      const defaultSettings = { 
        eventName: 'Evento Atual', 
        gremioName: 'Grêmio Estudantil',
        logoUrl: 'https://media-gru1-1.cdn.whatsapp.net/v/t61.24694-24/489405406_650586094569182_6793834854762065392_n.jpg?ccb=11-4&oh=01_Q5Aa4wGY7p0SayjbDIPzs9zg4cRQqjwpuZWHtXDXiacRVfJnLw&oe=6A35BF57&_nc_sid=5e03e0&_nc_cat=102'
      };
      
      const [settings, setSettings] = useState(() => {
        const loaded = loadData('pdv_settings', defaultSettings);
        return { ...defaultSettings, ...loaded };
      });
      
      const [eventLogs, setEventLogs] = useState(() => loadData('pdv_event_logs', []));
      const [products, setProducts] = useState(() => loadData('pdv_products', []));
      const [sales, setSales] = useState(() => loadData('pdv_sales', []));
      
      const [activeTab, setActiveTab] = useState('pos'); 
      const [cart, setCart] = useState([]);
      const [cartDiscount, setCartDiscount] = useState(0);

      const defaultDrawer = {
        200: 0, 100: 0, 50: 0, 20: 0, 10: 0, 5: 0, 2: 0, 1: 0, 0.5: 0, 0.25: 0, 0.1: 0, 0.05: 0
      };
      const [cashDrawer, setCashDrawer] = useState(() => loadData('pdv_cash_drawer', defaultDrawer));

      // Sistema de Nuvem
      const [sessionId, setSessionId] = useState(() => loadData('pdv_session_id', null));
      const [joinCode, setJoinCode] = useState('');
      const isSyncing = useRef(false);

      // Modais Customizados
      const [isCalcOpen, setIsCalcOpen] = useState(false);
      const [calcInput, setCalcInput] = useState('');
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', text: '', action: null, isDanger: false });
      const [alertDialog, setAlertDialog] = useState({ isOpen: false, title: '', text: '' });
      const [isPixModalOpen, setIsPixModalOpen] = useState(false);
      const [selectedEventLog, setSelectedEventLog] = useState(null); // Detalhes do Evento
      
      const [editingProduct, setEditingProduct] = useState(null);
      const [prodName, setProdName] = useState('');
      const [prodPrice, setProdPrice] = useState('');
      
      const [checkoutMsg, setCheckoutMsg] = useState('');
      const [pixStudentName, setPixStudentName] = useState('');
      const [pixStudentClass, setPixStudentClass] = useState('');

      // Persistência Local
      useEffect(() => { localStorage.setItem('pdv_theme', JSON.stringify(theme)); }, [theme]);
      useEffect(() => { localStorage.setItem('pdv_settings', JSON.stringify(settings)); }, [settings]);
      useEffect(() => { localStorage.setItem('pdv_event_logs', JSON.stringify(eventLogs)); }, [eventLogs]);
      useEffect(() => { localStorage.setItem('pdv_products', JSON.stringify(products)); }, [products]);
      useEffect(() => { localStorage.setItem('pdv_sales', JSON.stringify(sales)); }, [sales]);
      useEffect(() => { localStorage.setItem('pdv_cash_drawer', JSON.stringify(cashDrawer)); }, [cashDrawer]);
      useEffect(() => { localStorage.setItem('pdv_session_id', JSON.stringify(sessionId)); }, [sessionId]);

      // Aplicação do Tema Dark/Light
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // --- LÓGICA DE SINCRONIZAÇÃO FIREBASE ---
      useEffect(() => {
        if (!sessionId) return;
        const unsub = onSnapshot(doc(db, "pdv_sessions", sessionId), (docSnap) => {
          if (docSnap.exists()) {
            isSyncing.current = true;
            const data = docSnap.data();
            if(data.settings) setSettings(data.settings);
            if(data.products) setProducts(data.products);
            if(data.sales) setSales(data.sales);
            if(data.cashDrawer) setCashDrawer(data.cashDrawer);
            if(data.eventLogs) setEventLogs(data.eventLogs);
            
            setTimeout(() => { isSyncing.current = false; }, 800);
          } else {
            setSessionId(null);
            setAlertDialog({isOpen: true, title: 'Sessão Encerrada', text: 'A sessão remota foi fechada ou não existe mais.'});
          }
        });
        return () => unsub();
      }, [sessionId]);

      useEffect(() => {
        if(!sessionId || isSyncing.current) return;
        const pushToCloud = async () => {
          try {
            await setDoc(doc(db, "pdv_sessions", sessionId), {
              settings, products, sales, cashDrawer, eventLogs, updatedAt: new Date().toISOString()
            }, { merge: true });
          } catch(e) {
            console.error("Erro ao sincronizar dados", e);
          }
        };
        const timeoutId = setTimeout(pushToCloud, 1000);
        return () => clearTimeout(timeoutId);
      }, [settings, products, sales, cashDrawer, eventLogs, sessionId]);

      const createCloudSession = async () => {
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        try {
          await setDoc(doc(db, "pdv_sessions", code), {
            settings, products, sales, cashDrawer, eventLogs, createdAt: new Date().toISOString()
          });
          setSessionId(code);
          setAlertDialog({isOpen: true, title: 'Sessão Criada!', text: `Seu código de acesso é: ${code}. Use-o nos outros dispositivos para conectar.`});
        } catch(e) {
          setAlertDialog({isOpen: true, title: 'Erro de Conexão', text: 'Não foi possível criar a sessão na nuvem. Verifique sua rede.'});
        }
      };

      const joinCloudSession = async () => {
        if(!joinCode.trim()) return;
        const code = joinCode.trim().toUpperCase();
        try {
          const docSnap = await getDoc(doc(db, "pdv_sessions", code));
          if(docSnap.exists()) {
            setSessionId(code);
            setJoinCode('');
            setAlertDialog({isOpen: true, title: 'Conectado!', text: `Dispositivo sincronizado com a sessão ${code} com sucesso.`});
          } else {
            setAlertDialog({isOpen: true, title: 'Não Encontrado', text: 'O código inserido não existe ou a sessão foi encerrada.'});
          }
        } catch(e) {
          setAlertDialog({isOpen: true, title: 'Erro de Conexão', text: 'Falha ao buscar a sessão. Verifique sua internet.'});
        }
      };

      const disconnectSession = () => {
        setConfirmDialog({
          isOpen: true, title: 'Desconectar Dispositivo', text: 'Tem certeza? Este dispositivo não receberá mais atualizações dos outros caixas.', isDanger: true,
          action: () => setSessionId(null)
        });
      };

      // Utilitários
      const formatCurrency = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      const formatDate = (isoString) => new Date(isoString).toLocaleString('pt-BR');

      // --- CAIXA E VENDAS ---
      const addToCart = (product) => {
        setCart(prev => {
          const exists = prev.find(i => i.product.id === product.id);
          if (exists) return prev.map(i => i.product.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
          return [...prev, { product, quantity: 1 }];
        });
      };

      const removeFromCart = (productId) => {
        setCart(prev => {
          const exists = prev.find(i => i.product.id === productId);
          if (exists.quantity === 1) return prev.filter(i => i.product.id !== productId);
          return prev.map(i => i.product.id === productId ? { ...i, quantity: i.quantity - 1 } : i);
        });
      };

      const cartSubtotal = cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
      const cartTotal = Math.max(0, cartSubtotal - cartDiscount);

      const handlePixClick = () => {
        if (cart.length === 0) return;
        setIsPixModalOpen(true);
      };

      const processCheckout = (paymentMethod) => {
        if (cart.length === 0) return;
        
        if (paymentMethod === 'PIX' && (!pixStudentName.trim() || !pixStudentClass.trim())) {
          setAlertDialog({ isOpen: true, title: 'Atenção', text: 'Por favor, preencha o Nome e a Série do aluno.'});
          return;
        }

        const newSale = {
          id: Date.now().toString(),
          items: [...cart], subtotal: cartSubtotal, discount: cartDiscount, total: cartTotal,
          paymentMethod, timestamp: new Date().toISOString(),
          studentInfo: paymentMethod === 'PIX' ? { name: pixStudentName, schoolClass: pixStudentClass } : null
        };

        setSales([newSale, ...sales]); setCart([]); setCartDiscount(0);
        setPixStudentName(''); setPixStudentClass(''); setIsPixModalOpen(false);

        setCheckoutMsg(`Sucesso! ${formatCurrency(cartTotal)} via ${paymentMethod}`);
        setTimeout(() => setCheckoutMsg(''), 3000);
      };

      const cancelSale = (saleId) => {
        setConfirmDialog({
          isOpen: true, title: 'Estornar Venda', text: 'Tem certeza que deseja estornar (cancelar) esta venda? Ela será removida do histórico atual.', isDanger: true,
          action: () => setSales(sales.filter(s => s.id !== saleId))
        });
      };

      // --- PRODUTOS ---
      const saveProduct = (e) => {
        e.preventDefault();
        if (!prodName || !prodPrice) return;
        const priceNum = parseFloat(prodPrice.toString().replace(',', '.'));
        if (editingProduct) {
          setProducts(products.map(p => p.id === editingProduct.id ? { ...p, name: prodName, price: priceNum } : p));
          setEditingProduct(null);
        } else {
          setProducts([...products, { id: Date.now().toString(), name: prodName, price: priceNum }]);
        }
        setProdName(''); setProdPrice('');
      };

      const deleteProduct = (id) => {
        setConfirmDialog({
          isOpen: true, title: 'Excluir Produto', text: 'Deseja excluir este produto definitivamente do cardápio?', isDanger: true,
          action: () => {
            setProducts(products.filter(p => p.id !== id));
            setCart(cart.filter(item => item.product.id !== id));
          }
        });
      };

      // --- EXPORTAÇÃO E CÁLCULOS ---
      const getReport = (salesData = sales) => {
        return salesData.reduce((acc, sale) => {
          acc.total += sale.total;
          acc.discounts += sale.discount || 0;
          if (sale.paymentMethod === 'PIX') acc.pix += sale.total;
          if (sale.paymentMethod === 'DINHEIRO') acc.dinheiro += sale.total;

          sale.items.forEach(item => {
            if (!acc.items[item.product.id]) acc.items[item.product.id] = { name: item.product.name, quantity: 0, total: 0 };
            acc.items[item.product.id].quantity += item.quantity;
            acc.items[item.product.id].total += (item.quantity * item.product.price);
          });
          return acc;
        }, { total: 0, pix: 0, dinheiro: 0, discounts: 0, items: {} });
      };

      const executeWithLightMode = (callback) => {
        const wasDark = document.documentElement.classList.contains('dark');
        if (wasDark) document.documentElement.classList.remove('dark');
        setTimeout(() => {
          callback(() => {
            if (wasDark) document.documentElement.classList.add('dark');
          });
        }, 150);
      };

      const requestPrint = () => {
        executeWithLightMode((restoreTheme) => {
          window.print();
          setTimeout(restoreTheme, 1000); 
        });
      };

      const downloadPDF = (elementId, filenamePrefix) => {
        const element = document.getElementById(elementId);
        executeWithLightMode((restoreTheme) => {
          const opt = {
            margin: 10,
            filename: `${filenamePrefix}_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
          };
          html2pdf().set(opt).from(element).save().then(restoreTheme);
        });
      };

      const calculateDrawerTotal = () => {
        return Object.entries(cashDrawer).reduce((total, [value, qty]) => total + (Number(value) * Number(qty || 0)), 0);
      };

      // --- CALCULADORA ---
      const calcPos = useRef({ x: window.innerWidth > 768 ? window.innerWidth - 300 : 20, y: 20 });
      const calcRef = useRef(null);

      const handleCalcDragStart = (e) => {
        const startX = e.clientX || e.touches[0].clientX;
        const startY = e.clientY || e.touches[0].clientY;
        const startPosX = calcPos.current.x;
        const startPosY = calcPos.current.y;

        const onMove = (moveEvent) => {
          const currentX = moveEvent.clientX || (moveEvent.touches && moveEvent.touches[0].clientX);
          const currentY = moveEvent.clientY || (moveEvent.touches && moveEvent.touches[0].clientY);
          calcPos.current = {
            x: startPosX + (currentX - startX),
            y: startPosY + (currentY - startY)
          };
          if(calcRef.current) {
            calcRef.current.style.transform = `translate(${calcPos.current.x}px, ${calcPos.current.y}px)`;
          }
        };

        const onEnd = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onEnd);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onEnd);
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
      };

      const handleCalcBtn = (btn) => {
        if(btn === 'C') setCalcInput('');
        else if(btn === '=') { 
          try { 
            let evalStr = calcInput.replace(/×/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
            let res = eval(evalStr);
            setCalcInput(res.toString().replace(/\./g, ',')); 
          } catch(e) { 
            setCalcInput('Erro'); 
          } 
        } 
        else { 
          setCalcInput(prev => prev === 'Erro' ? btn : prev + btn); 
        }
      };

      const NavItem = ({ id, icon: Icon, label }) => (
        <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 font-medium ${activeTab === id ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
          <Icon size={20} /> <span className="hidden md:block">{label}</span>
        </button>
      );

      const reportData = getReport();
      const drawerTotal = calculateDrawerTotal();
      const drawerDiff = drawerTotal - reportData.dinheiro;

      return (
        <div className="min-h-screen flex w-full">
          
          {/* ================= MODAIS ESCONDIDOS ================= */}
          
          {/* Alerta Simples */}
          {alertDialog.isOpen && (
            <div className="absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm p-6 animate-in zoom-in-95">
                <div className="flex items-center gap-3 mb-4 text-blue-600 dark:text-blue-400">
                  <Info size={28}/> <h3 className="text-xl font-bold">{alertDialog.title}</h3>
                </div>
                <p className="text-gray-700 dark:text-gray-300 mb-6">{alertDialog.text}</p>
                <button onClick={() => setAlertDialog({isOpen: false})} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-colors">
                  Entendi
                </button>
              </div>
            </div>
          )}

          {/* Confirmação (Sim/Não) */}
          {confirmDialog.isOpen && (
            <div className="absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm p-6 animate-in zoom-in-95">
                <div className={`flex items-center gap-3 mb-4 ${confirmDialog.isDanger ? 'text-red-500' : 'text-blue-600 dark:text-blue-400'}`}>
                  {confirmDialog.isDanger ? <AlertTriangle size={28}/> : <Info size={28}/>} 
                  <h3 className="text-xl font-bold">{confirmDialog.title}</h3>
                </div>
                <p className="text-gray-700 dark:text-gray-300 mb-6">{confirmDialog.text}</p>
                <div className="flex gap-3">
                  <button onClick={() => setConfirmDialog({...confirmDialog, isOpen: false})} className="flex-1 py-3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                    Cancelar
                  </button>
                  <button onClick={() => { confirmDialog.action(); setConfirmDialog({...confirmDialog, isOpen: false}); }} className={`flex-1 py-3 text-white rounded-xl font-bold transition-colors ${confirmDialog.isDanger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Modal: Detalhes do Evento Arquivado */}
          {selectedEventLog && (
            <div className="absolute inset-0 bg-black/60 z-[90] flex items-center justify-center p-4 backdrop-blur-sm print:hidden">
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden animate-in zoom-in-95 flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center p-5 border-b dark:border-gray-700 bg-blue-50 dark:bg-blue-900/30">
                  <div>
                    <h3 className="font-bold text-blue-800 dark:text-blue-400 flex items-center gap-2 text-lg">
                      <Archive size={20} /> Detalhes: {selectedEventLog.eventName}
                    </h3>
                    <p className="text-sm text-gray-500 mt-1">{formatDate(selectedEventLog.date)}</p>
                  </div>
                  <button onClick={() => setSelectedEventLog(null)} className="text-gray-500 hover:text-red-500 transition-colors p-2"><X size={24} /></button>
                </div>
                <div className="p-6 overflow-y-auto flex-1">
                  <div className="grid grid-cols-2 gap-4 mb-6">
                    <div className="bg-green-50 dark:bg-green-900/20 p-4 rounded-xl border border-green-200 dark:border-green-800/50 text-center">
                      <p className="text-xs uppercase font-bold text-green-700 dark:text-green-400">Total Faturado</p>
                      <p className="text-2xl font-black text-green-700 dark:text-green-300">{formatCurrency(selectedEventLog.totalSales)}</p>
                    </div>
                    <div className="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-200 dark:border-blue-800/50 text-center">
                      <p className="text-xs uppercase font-bold text-blue-700 dark:text-blue-400">Total de Transações</p>
                      <p className="text-2xl font-black text-blue-700 dark:text-blue-300">{selectedEventLog.salesCount}</p>
                    </div>
                  </div>
                  
                  <h4 className="font-bold mb-3 text-lg border-b dark:border-gray-700 pb-2">Histórico de Transações do Evento</h4>
                  <div className="space-y-3">
                    {selectedEventLog.salesData.length === 0 && <p className="text-gray-500">Nenhuma transação registrada neste evento.</p>}
                    {selectedEventLog.salesData.map(sale => (
                      <div key={sale.id} className="bg-gray-50 dark:bg-gray-700/30 p-4 rounded-xl border dark:border-gray-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <div>
                          <div className="flex flex-wrap items-center gap-2 mb-1">
                            <span className={`px-2 py-0.5 rounded text-xs font-bold ${sale.paymentMethod === 'PIX' ? 'bg-teal-100 dark:bg-teal-900/50 text-teal-800 dark:text-teal-300' : 'bg-emerald-100 dark:bg-emerald-900/50 text-emerald-800 dark:text-emerald-300'}`}>{sale.paymentMethod}</span>
                            <span className="text-xs text-gray-500">{new Date(sale.timestamp).toLocaleTimeString('pt-BR')}</span>
                            {sale.studentInfo && <span className="text-xs bg-gray-200 dark:bg-gray-600 px-2 py-0.5 rounded-md">👤 {sale.studentInfo.name} ({sale.studentInfo.schoolClass})</span>}
                          </div>
                          <p className="text-sm text-gray-700 dark:text-gray-300">
                            {sale.items.map(i => `${i.quantity}x ${i.product.name}`).join(' • ')}
                          </p>
                        </div>
                        <span className="text-lg font-black shrink-0">{formatCurrency(sale.total)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Calculadora Flutuante */}
          {isCalcOpen && (
            <div 
              ref={calcRef}
              style={{ transform: `translate(${calcPos.current.x}px, ${calcPos.current.y}px)` }}
              className="fixed top-0 left-0 z-50 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 w-64 print:hidden animate-in fade-in overflow-hidden"
            >
              <div 
                className="flex justify-between items-center p-3 bg-gray-100 dark:bg-gray-900 cursor-move border-b border-gray-200 dark:border-gray-700"
                onMouseDown={handleCalcDragStart}
                onTouchStart={handleCalcDragStart}
              >
                <div className="flex items-center gap-2 text-gray-500">
                  <GripHorizontal size={16}/>
                  <span className="font-bold text-sm uppercase">Calculadora</span>

                        <p className="text-xl font-bold text-gray-800">{formatCurrency(reportData.dinheiro)}</p>
                      </div>
                      <div className="text-center md:text-right mt-4 md:mt-0">
                        <p className="text-xs uppercase font-bold text-gray-600">Diferença de Caixa</p>
                        {drawerDiff === 0 ? (
                          <p className="text-2xl font-bold text-green-700">Bateu Perfeito (+R$ 0,00)</p>
                        ) : drawerDiff > 0 ? (
                          <p className="text-2xl font-bold text-blue-700">Sobra: {formatCurrency(drawerDiff)}</p>
                        ) : (
                          <p className="text-2xl font-bold text-red-700">Falta (Quebra): {formatCurrency(Math.abs(drawerDiff))}</p>
                        )}
                      </div>
                    </div>

                    <div className="mt-20 pt-16 flex flex-col md:flex-row justify-around text-center text-sm font-semibold text-black gap-8">
                      <div>
                        <p>_____________________________________</p>
                        <p className="mt-2">Coordenador Geral</p>
                      </div>
                      <div>
                        <p>_____________________________________</p>
                        <p className="mt-2">Coordenador Financeiro</p>
                      </div>
                      <div>
                        <p>_____________________________________</p>
                        <p className="mt-2">Operador de Caixa</p>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* === CONFIGURAÇÕES === */}
              {activeTab === 'settings' && (
                <div className="max-w-3xl mx-auto print:hidden space-y-6">
                  <h2 className="text-2xl font-bold mb-6">Configurações do Sistema</h2>
                  
                  {/* SINCRONIZAÇÃO NUVEM (NOVO) */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border dark:border-gray-700 p-6 space-y-4">
                    <h3 className="font-bold text-lg border-b dark:border-gray-700 pb-2 flex items-center justify-between">
                      <span className="flex items-center gap-2"><Cloud size={20}/> Conexão em Nuvem (Multi-Dispositivos)</span>
                      {sessionId ? <span className="flex items-center gap-1 text-sm bg-green-100 text-green-700 px-2 py-1 rounded"><Wifi size={16}/> Online</span> : <span className="flex items-center gap-1 text-sm bg-gray-200 text-gray-600 px-2 py-1 rounded"><WifiOff size={16}/> Offline</span>}
                    </h3>
                    
                    {sessionId ? (
                      <div className="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-200 dark:border-blue-800 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div>
                          <p className="text-sm text-gray-600 dark:text-gray-400">Você está conectado à sessão:</p>
                          <p className="text-3xl font-black text-blue-600 dark:text-blue-400 font-mono tracking-widest">{sessionId}</p>
                        </div>
                        <button onClick={disconnectSession} className="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg w-full md:w-auto transition-colors">
                          Desconectar
                        </button>
                      </div>
                    ) : (
                      <div className="flex flex-col md:flex-row gap-6">
                        <div className="flex-1 space-y-3">
                          <p className="text-sm text-gray-600 dark:text-gray-400">Crie uma nova sala para que outros caixas conectem.</p>
                          <button onClick={createCloudSession} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl flex justify-center items-center gap-2 transition-colors">
                            <PlusCircle size={20}/> Criar Nova Sessão
                          </button>
                        </div>
                        <div className="flex-1 space-y-3 border-t md:border-t-0 md:border-l dark:border-gray-700 pt-4 md:pt-0 md:pl-6">
                          <p className="text-sm text-gray-600 dark:text-gray-400">Ou entre em uma sessão existente (Digite o código):</p>
                          <div className="flex gap-2">
                            <input 
                              type="text" value={joinCode} onChange={(e) => setJoinCode(e.target.value.toUpperCase())} maxLength={6}
                              placeholder="CÓDIGO" 
                              className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none font-mono text-center font-bold" 
                            />
                            <button onClick={joinCloudSession} className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-4 rounded-xl transition-colors">
                              Entrar
                            </button>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Identidade Visual */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border dark:border-gray-700 p-6 space-y-4">
                    <h3 className="font-bold text-lg border-b dark:border-gray-700 pb-2 flex items-center gap-2"><ImageIcon size={20}/> Identidade Visual</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold mb-2">Nome do Grêmio / Organização</label>
                        <input type="text" value={settings.gremioName} onChange={e => setSettings({...settings, gremioName: e.target.value})} className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-2">Nome do Evento Atual</label>
                        <input type="text" value={settings.eventName} onChange={e => setSettings({...settings, eventName: e.target.value})} className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold mb-2">URL da Logo (Imagem)</label>
                      <input type="url" value={settings.logoUrl} onChange={e => setSettings({...settings, logoUrl: e.target.value})} className="w-full p-3 bg-gray-50 dark:bg-gray-900 border dark:border-gray-600 rounded-xl outline-none" />
                    </div>
                  </div>

                  {/* Gerenciamento de Eventos (Logs) */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border dark:border-gray-700 p-6">
                     <h3 className="font-bold text-lg border-b dark:border-gray-700 pb-2 mb-4 flex items-center gap-2"><Archive size={20}/> Gerenciamento de Eventos</h3>
                     <p className="text-sm text-gray-600 dark:text-gray-400 mb-4">
                       Finalizou o evento de hoje? Arquive as vendas para limpar o caixa e guardar os registros no histórico.
                     </p>
                     <button onClick={() => {
                        if(sales.length === 0) return setAlertDialog({isOpen: true, title: 'Aviso', text: 'Não há vendas neste evento para arquivar.'});
                        setConfirmDialog({
                          isOpen: true, title: 'Arquivar Evento', text: `Deseja encerrar o evento "${settings.eventName}" e salvar os logs? O caixa será zerado para o próximo evento.`, isDanger: false,
                          action: () => {
                            const newLog = {
                              id: Date.now().toString(),
                              eventName: settings.eventName,
                              date: new Date().toISOString(),
                              totalSales: getReport(sales).total,
                              salesCount: sales.length,
                              salesData: [...sales]
                            };
                            setEventLogs([newLog, ...eventLogs]);
                            setSales([]);
                            setCashDrawer(defaultDrawer);
                            setSettings({...settings, eventName: 'Novo Evento'});
                            setAlertDialog({isOpen: true, title: 'Sucesso', text: 'Evento salvo nos logs e caixa zerado com sucesso!'});
                          }
                        });
                     }} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center gap-2 transition-colors">
                       <Archive size={20}/> Encerrar Evento Atual e Arquivar
                     </button>

                     {/* Tabela de Logs Antigos */}
                     {eventLogs.length > 0 && (
                       <div className="mt-8">
                         <h4 className="font-bold mb-3">Histórico de Eventos Anteriores</h4>
                         <div className="overflow-x-auto">
                           <table className="w-full text-left text-sm border dark:border-gray-700 rounded-lg overflow-hidden">
                             <thead className="bg-gray-100 dark:bg-gray-900 text-gray-600 dark:text-gray-400">
                               <tr><th className="p-3">Data</th><th className="p-3">Evento</th><th className="p-3">Vendas</th><th className="p-3">Faturamento</th><th className="p-3 text-center">Ação</th></tr>
                             </thead>
                             <tbody className="divide-y divide-gray-200 dark:divide-gray-700">
                               {eventLogs.map(log => (
                                 <tr key={log.id} className="hover:bg-gray-50 dark:hover:bg-gray-800/50">
                                   <td className="p-3 whitespace-nowrap">{new Date(log.date).toLocaleDateString('pt-BR')}</td>
                                   <td className="p-3 font-medium">{log.eventName}</td>
                                   <td className="p-3">{log.salesCount}</td>
                                   <td className="p-3 font-bold text-green-600 dark:text-green-400">{formatCurrency(log.totalSales)}</td>
                                   <td className="p-3 text-center">
                                      <button onClick={() => setSelectedEventLog(log)} className="text-blue-500 bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-100 flex items-center gap-1 mx-auto transition-colors">
                                        <FileText size={14}/> Abrir
                                      </button>
                                   </td>
                                 </tr>
                               ))}
                             </tbody>
                           </table>
                         </div>
                       </div>
                     )}
                  </div>

                  {/* Zona de Perigo */}
                  <div className="bg-red-50 dark:bg-red-900/20 rounded-2xl border border-red-200 dark:border-red-800/50 p-6">
                    <h3 className="font-bold text-red-800 dark:text-red-400 mb-2 flex items-center gap-2"><AlertTriangle/> Zona de Perigo (Hard Reset)</h3>
                    <p className="text-sm text-red-600 dark:text-red-300 mb-4">Isto apagará todas as vendas do evento atual, apagará o histórico de logs salvos e resetará a gaveta de dinheiro.</p>
                    <button onClick={() => {
                        setConfirmDialog({
                          isOpen: true, title: 'Zerar Todo o Sistema', text: 'Você tem certeza absoluta? Todo o histórico atual, logs de eventos anteriores e dados da gaveta serão perdidos permanentemente.', isDanger: true,
                          action: () => {
                            setSales([]);
                            setEventLogs([]);
                            setCashDrawer(defaultDrawer); 
                            setActiveTab('pos');
                          }
                        });
                    }} className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition-colors">
                      Excluir Todos os Dados e Resetar
                    </button>
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
